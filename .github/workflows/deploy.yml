name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Fetch latest publications from OpenAlex
        run: bun run scripts/fetch-publications.mjs
        continue-on-error: true

      - name: Fetch latest news from rcees.uenr.edu.gh
        run: bun run scripts/fetch-news.mjs
        continue-on-error: true

      - name: Fetch ACE Impact documents from rcees.uenr.edu.gh
        run: bun run scripts/fetch-ace-impact.mjs
        continue-on-error: true

      - run: bun run build
        env:
          NODE_ENV: production

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
